title:
  en_us: Levels + Grids to Workset
  es_es: Niveles y Rejillas a Subproyecto

tooltip:
  en_us: |
    Quickly moves all Levels and Grids in the project to a selected user workset to maintain project organization.
    Levels + Grids to Workset is a pyMENVIC utility designed to automate 
    the management of reference elements.
    _______________________________________________________________
    Key features:
    - Mass Reassignment: Identifies every Level and Grid in the model for a single-action move.
    - Intelligent Filtering: Scans all user-defined worksets and lets you pick the target.
    - Status Audit: Reports exactly which elements were moved, which were already correct, and any that failed.
    - Error Handling: Includes detailed reporting of ID and Category in case of locked or read-only elements.

    Ideal for setting up new projects or fixing visibility issues related to workset management.
  es_es: |
    Mueve rápidamente todos los Niveles y Rejillas del proyecto al subproyecto (workset) seleccionado para mantener la organización del modelo.
    _______________________________________________________________
    Niveles y Rejillas a Subproyecto es una utilidad de pyMENVIC diseñada 
    para automatizar la gestión de elementos de referencia.

    Características clave:
    - Reasignación Masiva: Identifica cada Nivel y Rejilla en el modelo para moverlos en una sola acción.
    - Filtrado Inteligente: Escanea todos los subproyectos de usuario y permite elegir el destino.
    - Auditoría de Estado: Informa exactamente qué elementos se movieron, cuáles ya estaban correctos y cuáles fallaron.
    - Gestión de Errores: Incluye un reporte detallado con ID y Categoría en caso de elementos bloqueados.

    Ideal para configurar proyectos nuevos o solucionar problemas de visibilidad relacionados con subproyectos.

description:
  en_us: >
    Levels + Grids to Workset automates a common BIM coordination task: 
    ensuring all reference datum is on the correct workset. It scans the 
    entire project, allows the user to select from current user worksets, 
    and performs the migration safely. The tool provides a final MENVIC 
    report showing a summary of actions, including counts for reassigned, 
    skipped, and failed elements.
  es_es: >
    Niveles y Rejillas a Subproyecto automatiza una tarea común de coordinación 
    BIM: asegurar que todas las referencias estén en el subproyecto correcto. 
    Escanea todo el proyecto, permite al usuario seleccionar entre los 
    subproyectos de usuario actuales y realiza la migración de forma segura. 
    La herramienta proporciona un reporte final de MENVIC que muestra un 
    resumen de acciones, incluyendo conteos de elementos reasignados, 
    omitidos y fallidos.

