title:
  en_us: Replace Filters
  es_es: Reemplazar Filtros

tooltip:
  en_us: |
    Replace one filter with another across views and templates.
  es_es: |
    Reemplaza un filtro por otro en vistas y templates.

description:
  en_us: >
    Replace Filters lets you review source and target filter states in each
    view or template, then replace or merge filters without losing the
    intended visibility and override setup.
  es_es: >
    Reemplazar Filtros te permite revisar el estado del filtro origen y
    destino en cada vista o template, y luego reemplazar o combinar filtros
    sin perder la configuracion de visibilidad y overrides.

