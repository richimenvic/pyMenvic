title:
  en_us: View Type Manager
  es_es: Gestor de Tipos de Vista

tooltip:
  en_us: |
    Analyzes existing View Types and enforces discipline-based naming standards through an interactive management interface.
    View Type Manager is an advanced pyMENVIC tool designed to unify and 
    organize the project's view hierarchy.
    _______________________________________________________________
    Key features:
    - Discipline Logic: Loads naming standards from external configuration files (view_type_standards.txt).
    - Smart Grouping: Automatically separates View Types by Family (Floor Plans, Elevations, 3D Views, etc.).
    - Interactive Review: Proposes target names while allowing manual edits before execution.
    - Safety First: Validates naming conflicts and provides a detailed summary of all renamed types.

    Ideal for project cleanup, ensuring documentation consistency and enforcing internal BIM protocols.
  es_es: |
    Analiza los tipos de vista existentes y aplica estándares de nomenclatura por disciplina mediante una interfaz de gestión interactiva.
    _______________________________________________________________
    Gestor de Tipos de Vista es una herramienta avanzada de pyMENVIC diseñada 
    para unificar y organizar la jerarquía de vistas del proyecto.

    Características clave:
    - Lógica de Disciplina: Carga estándares de nombres desde archivos externos (view_type_standards.txt).
    - Agrupación Inteligente: Separa automáticamente tipos de vista por familia (Plantas, Alzados, Vistas 3D, etc.).
    - Revisión Interactiva: Propone nombres destino permitiendo ediciones manuales antes de la ejecución.
    - Seguridad Integrada: Valida conflictos de nombres y proporciona un resumen detallado de los cambios.

    Ideal para limpieza de proyectos, consistencia documental y aplicación de protocolos BIM internos.

description:
  en_us: >
    View Type Manager automates the complex process of standardizing View 
    Family Types in Revit. By utilizing an external standard file, it maps 
    current types to office-approved nomenclature. The tool features a 
    robust WPF interface that displays usage status, family categories, 
    and proposed changes, allowing BIM managers to refine the model's 
    organization with surgical precision.
  es_es: >
    Gestor de Tipos de Vista automatiza el complejo proceso de estandarizar 
    los View Family Types en Revit. Utilizando un archivo de estándares externo, 
    mapea los tipos actuales a la nomenclatura aprobada por la oficina. 
    La herramienta cuenta con una interfaz WPF robusta que muestra el estado 
    de uso, categorías de familia y cambios propuestos, permitiendo a los 
    BIM managers refinar la organización del modelo con precisión quirúrgica.

