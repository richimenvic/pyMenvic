title:
  en_us: Levels + Grids to Standard Workset
  es_es: Niveles y Rejillas a Subproyecto Estandar

tooltip:
  en_us: |
    Reviews Levels, Grids and Scope Boxes against the selected discipline standard workset.
    If the target standard workset does not exist yet, the tool can create it and then continue the review.
    _______________________________________________________________
    Key features:
    - Standard Review: Checks Levels, Grids and Scope Boxes against the discipline target.
    - Create Missing Standard: Offers to create the standard target workset when it is missing.
    - Guided Reassignment: Lets you review grouped rows and apply only valid changes.
    - Status Audit: Reports moved, skipped and failed elements after apply.

    Ideal for setting up discipline standards in new projects or correcting datum placement later.
  es_es: |
    Revisa Niveles, Rejillas y Scope Boxes contra el subproyecto estándar de la disciplina seleccionada.
    Si el subproyecto estándar aún no existe, la herramienta puede crearlo y continuar con la revisión.
    _______________________________________________________________
    Estandarizar Niveles y Rejillas es una utilidad de pyMENVIC diseñada 
    para normalizar la ubicación de elementos de referencia.

    Características clave:
    - Revisión Estándar: Verifica Niveles, Rejillas y Scope Boxes contra el destino de disciplina.
    - Crear Estándar Faltante: Permite crear el subproyecto objetivo cuando aún no existe.
    - Reasignación Guiada: Permite revisar filas agrupadas y aplicar solo cambios válidos.
    - Auditoría de Estado: Informa elementos movidos, omitidos y fallidos al finalizar.

    Ideal para configurar estándares en proyectos nuevos o corregir la ubicación de datums más adelante.

description:
  en_us: >
    This tool reviews Levels, Grids and Scope Boxes against the standard 
    workset for the selected discipline. When the target standard does not 
    exist, it can create it directly from the workflow, then let the user 
    review grouped rows and apply the required changes safely.
  es_es: >
    Esta herramienta revisa Niveles, Rejillas y Scope Boxes contra el 
    subproyecto estándar de la disciplina seleccionada. Cuando el estándar 
    objetivo no existe, puede crearlo dentro del mismo flujo, luego permite 
    revisar filas agrupadas y aplicar los cambios necesarios de forma segura.

