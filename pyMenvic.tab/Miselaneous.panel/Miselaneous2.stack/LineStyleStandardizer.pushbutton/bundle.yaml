title:
  en_us: Line Style Standardizer
  fr_fr: Standardisation des styles de lignes
  es_es: Estandarizador de Estilos de Líneas

tooltip:
  en_us: Standardizes line styles by properties (weight, color and pattern), merges duplicates and removes unused styles (Detail and Model lines).
  fr_fr: Standardise les styles de lignes selon leurs propriétés (épaisseur, couleur et motif), fusionne les doublons et supprime les styles inutilisés (lignes de détail et de modèle).
  es_es: Estandariza los estilos de líneas por propiedades (peso, color y patrón), fusiona duplicados y elimina estilos sin uso (líneas de detalle y modelo).

author: MENVIC
version: 1.0

