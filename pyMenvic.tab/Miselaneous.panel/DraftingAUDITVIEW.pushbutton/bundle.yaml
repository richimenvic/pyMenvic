title:
  en_us: Drafting Audit View
  es_es: Auditoría de Dibujo

tooltip:
  en_us: |
    Create or open the audit drafting view.
    __________________________________________
    Drafting Audit View is a pyMENVIC utility that creates or opens the
    drafting view "AUDIT_DRAFTING_VIEW" in the current Revit project.

    This view serves as a dedicated workspace for audit graphics, reports,
    diagnostic elements, and support content generated by pyMENVIC tools.

    If the view already exists, the tool opens it directly.
    If it does not exist, it is created automatically.

  es_es:  |
    Crea o abre la vista de diseño de auditoría.
    __________________________________________
    Drafting Audit View es una utilidad de pyMENVIC que crea o abre la vista
    de dibujo "AUDIT_DRAFTING_VIEW" en el proyecto actual de Revit.

    Esta vista funciona como un espacio de trabajo dedicado para gráficos de
    auditoría, reportes, elementos de diagnóstico y contenido de apoyo generado
    por las herramientas de pyMENVIC.

    Si la vista ya existe, la herramienta la abre directamente.
    Si no existe, la crea automáticamente.

