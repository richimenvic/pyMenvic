tooltip:
  en_us: |
    Purge imported DWG line patterns from the current Revit project.
    _______________________________________________________________
    Purge DWG Line Patterns is a pyMENVIC cleanup tool for removing line patterns
    created by linked or imported DWG files, especially those with names starting
    with "IMPORT".

    Key features:
    - DWG cleanup: Targets imported CAD line patterns.
    - Safer purge: Focuses on line patterns generated by DWG imports or links.
    - Model hygiene: Helps reduce unnecessary imported graphic standards.
    - Faster auditing: Simplifies cleanup after CAD coordination workflows.

    Ideal for BIM coordinators and project teams that need cleaner Revit projects
    after using DWG references.

  es_es: |
    Limpia patrones de línea importados desde DWG en el proyecto Revit actual.
    _______________________________________________________________
    Purge DWG Line Patterns es una herramienta de limpieza de pyMENVIC para eliminar
    patrones de línea creados por archivos DWG vinculados o importados, especialmente
    aquellos cuyos nombres comienzan con "IMPORT".

    Características clave:
    - Limpieza DWG: Detecta patrones de línea importados desde CAD.
    - Purga más segura: Se enfoca en patrones generados por vínculos o importaciones DWG.
    - Higiene del modelo: Ayuda a reducir estándares gráficos innecesarios importados.
    - Auditoría más rápida: Facilita la limpieza después de flujos de coordinación CAD.

    Ideal para coordinadores BIM y equipos de proyecto que necesitan modelos Revit
    más limpios después de usar referencias DWG.

description:
  en_us: >
    Purge DWG Line Patterns helps clean Revit projects by identifying and removing
    imported CAD line patterns, especially those created from linked or imported
    DWG files with names starting with "IMPORT". It supports model hygiene and
    reduces unnecessary imported graphic standards.

  es_es: >
    Purge DWG Line Patterns ayuda a limpiar proyectos Revit identificando y eliminando
    patrones de línea importados desde CAD, especialmente aquellos creados por archivos
    DWG vinculados o importados cuyos nombres comienzan con "IMPORT". Favorece la
    higiene del modelo y reduce estándares gráficos importados innecesarios.

