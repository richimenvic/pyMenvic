    Audit
  es_es: |-
    Auditar
    Vistas

tooltip:
  en_us: |
    Creates or opens a dedicated drafting view named "AUDIT_DRAFTING_VIEW" to serve as a workspace for pyMENVIC diagnostic graphics and reports.
    Drafting Audit View is a pyMENVIC utility that ensures a standardized 
    environment for audit-related content within your Revit project.
    _______________________________________________________________
    Key features:
    - Auto-creation: Generates the view instantly if it doesn't exist.
    - Smart Organization: Automatically assigns Discipline and Sub-Discipline 
      parameters (e.g., _MENVIC_AUDIT) for browser clarity.
    - Quick Access: Opens the view and sets it as the active view for immediate use.

    Ideal for keeping audit elements and diagnostic reports separate from 
    project documentation.
  es_es: |
    Crea o abre una vista de diseño dedicada llamada "AUDIT_DRAFTING_VIEW" para servir como espacio de trabajo para gráficos y reportes de diagnóstico de pyMENVIC.
    _______________________________________________________________
    Drafting Audit View es una utilidad de pyMENVIC que asegura un entorno 
    estandarizado para contenido relacionado con auditorías en tu proyecto.

    Características clave:
    - Creación automática: Genera la vista al instante si no existe.
    - Organización inteligente: Asigna automáticamente parámetros de Disciplina 
      y Sub-Disciplina (ej. _MENVIC_AUDIT) para mantener el navegador ordenado.
    - Acceso rápido: Abre la vista y la establece como activa para uso inmediato.

    Ideal para mantener los elementos de auditoría y reportes de diagnóstico 
    separados de la documentación del proyecto.

description:
  en_us: >
    Drafting Audit View provides a centralized workspace for all pyMENVIC 
    diagnostic tools. It handles the automated creation of the 
    "AUDIT_DRAFTING_VIEW", including the setup of view family types and 
    browser organization parameters. If the view is already present, the 
    tool focuses the user's interface on it, ensuring a seamless 
    transition to audit tasks.
  es_es: >
    Drafting Audit View proporciona un espacio de trabajo centralizado para 
    todas las herramientas de diagnóstico de pyMENVIC. Gestiona la creación 
    automatizada de la vista "AUDIT_DRAFTING_VIEW", incluyendo la configuración 
    de tipos de familia de vista y parámetros de organización del navegador. 
    Si la vista ya existe, la herramienta enfoca la interfaz del usuario en 
    ella, asegurando una transición fluida hacia las tareas de auditoría.

