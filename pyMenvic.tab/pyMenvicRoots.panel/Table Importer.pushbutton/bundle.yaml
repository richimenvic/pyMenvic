title:
  en_us: Table Importer
  es_es: Importar Tablas

tooltip:
  en_us: |
    Import Excel tables into Revit views through a dedicated table import interface.
    _______________________________________________________________
    Table Importer - pyMENVIC is a pyMENVIC productivity tool designed to simplify
    the process of bringing external Excel-based information into Revit views.

    Key features:
    - Excel Import: Select and import spreadsheet data into Revit.
    - Table Preview: Review table content before placing it in the project.
    - View Integration: Bring external table information into Revit views.
    - Documentation Support: Helps coordinate non-Revit data with project documentation.

    Ideal for legends, schedules, technical tables, and external project information.
  es_es: |
    Importa tablas de Excel a vistas de Revit mediante una interfaz dedicada.
    _______________________________________________________________
    Table Importer - pyMENVIC es una herramienta de productividad de pyMENVIC diseñada
    para simplificar la incorporación de información externa basada en Excel dentro de Revit.

    Características clave:
    - Importación desde Excel: Selecciona e importa datos de hojas de cálculo a Revit.
    - Previsualización de Tabla: Revisa el contenido antes de colocarlo en el proyecto.
    - Integración con Vistas: Incorpora información externa en vistas de Revit.
    - Soporte de Documentación: Ayuda a coordinar datos externos con la documentación del proyecto.

    Ideal para leyendas, tablas, documentación técnica e información externa del proyecto.

description:
  en_us: >
    Table Importer - pyMENVIC provides a focused workflow to import Excel-based
    table information into Revit views. It helps users bring external project data
    into the model environment while keeping documentation organized and easier
    to coordinate.
  es_es: >
    Table Importer - pyMENVIC proporciona un flujo de trabajo enfocado para importar
    información de tablas desde Excel a vistas de Revit. Ayuda a incorporar datos
    externos al entorno del modelo, manteniendo la documentación organizada y más
    fácil de coordinar.

